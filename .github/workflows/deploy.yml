name: Deploy IRTH OS

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 */4 * *'

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @irth/api build
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: apps/api
          command: deploy

  deploy-admin:
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @irth/admin build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}
      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: irth-admin
          directory: apps/admin/out

  keep-alive:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Ping Supabase to prevent pause
        run: |
          curl -s "${{ secrets.SUPABASE_URL }}/rest/v1/organizations?limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" > /dev/null
          echo "Supabase pinged successfully"
